<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinição de Senha - Speak2Sign</title>
</head>
<body style="font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f4f4f9;">
<table border="0" cellpadding="0" cellspacing="0" width="100%">
    <tr>
        <td style="padding: 40px 10px 40px 10px;">
            <table align="center" border="0" cellpadding="0" cellspacing="0" style="max-width: 600px; width: 100%; border-collapse: collapse; background-color: #ffffff; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">

                <tr>
                    <td align="center" bgcolor="#006400" style="padding: 25px 20px 25px 20px;">
                        <h1 style="font-size: 38px; font-weight: 300; font-style: italic; color: #ffffff; margin: 0; text-align: center;">
                            Speak2Sign
                        </h1>
                    </td>
                </tr>

                <tr>
                    <td align="center" style="padding: 50px 30px 20px 30px; font-size: 20px; line-height: 1.5; color: #333333; font-weight: bold;">
                        Olá, <span th:text="${nome}">[Nome do Usuário]</span>
                    </td>
                </tr>

                <tr>
                    <td align="center" style="padding: 0px 30px 30px 30px;">
                        <p style="font-size: 16px; line-height: 1.5; color: #555555; margin: 0 0 20px 0; text-align: center;">
                            Recebemos uma solicitação para redefinir sua senha no aplicativo Speak2Sign.
                        </p>
                        <p style="font-size: 16px; line-height: 1.5; color: #555555; margin: 0 0 30px 0; text-align: center;">
                            Use o código abaixo para continuar o processo.
                        </p>

                        <div style="background-color: #f0f8ff; border: 1px dashed #006400; border-radius: 8px; padding: 15px 20px; display: inline-block;">
                            <p style="font-size: 28px; font-weight: bold; color: #006400; margin: 0; letter-spacing: 3px;" th:text="${token}">123456</p>
                        </div>

                        <p style="font-size: 18px; line-height: 1.5; color: #777777; margin: 20px 0 0 0; text-align: center;">
                            Este código vai expirar em 15 minutos.
                        </p>
                    </td>
                </tr>

                <tr>
                    <td style="padding: 20px 30px 20px 30px; border-top: 1px solid #eeeeee;">
                        <p style="margin: 0; font-size: 12px; line-height: 1.5; color: #888888; text-align: center;">
                            © 2026 Speak2Sign.
                        </p>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
